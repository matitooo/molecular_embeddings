name: drug_prediction_droparray
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  # ─── Python ───
  - python=3.11
  - pip

  # ─── Core scientific stack ───
  - numpy=1.26.*
  - scipy
  - pandas
  - scikit-learn
  - matplotlib
  - networkx
  - sympy
  - joblib
  - tqdm

  # ─── PyTorch CUDA 12.1 ───
  - pytorch=2.2.*
  - torchvision=0.17.*
  - torchaudio=2.2.*
  - pytorch-cuda=12.1

  # ─── Chemistry ───
  - rdkit

  # ─── Dev ───
  - ipykernel
  - ipython
  - jupyter_client
  - jupyter_core

  # ─── Pip packages ───
  - pip:
      # ML / optimization
      - optuna==3.1.0
      - torchmetrics>=1.2.0

      # OGB
      - ogb==1.3.3

      # utilities
      - fsspec
      - requests
      - pyyaml
      - filelock
      - pydantic
      - synergy==1.0.0

      # PyTorch Geometric (prebuilt cu121 + torch2.2)
      - torch-geometric
      - https://data.pyg.org/whl/torch-2.2.0+cu121/torch_scatter-2.1.2+pt22cu121-cp311-cp311-linux_x86_64.whl
      - https://data.pyg.org/whl/torch-2.2.0+cu121/torch_sparse-0.6.18+pt22cu121-cp311-cp311-linux_x86_64.whl
      - https://data.pyg.org/whl/torch-2.2.0+cu121/torch_cluster-1.6.3+pt22cu121-cp311-cp311-linux_x86_64.whl
      - https://data.pyg.org/whl/torch-2.2.0+cu121/torch_spline_conv-1.2.2+pt22cu121-cp311-cp311-linux_x86_64.whl

      # DGL cu121 torch2.2
      - https://data.dgl.ai/wheels/torch-2.2/cu121/dgl-2.4.0%2Bcu121-cp311-cp311-manylinux1_x86_64.whl
